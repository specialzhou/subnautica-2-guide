name: 检查官方 Wiki 修订

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: official-wiki-revisions
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 准备审核分支
        run: |
          git fetch origin automation/wiki-revisions || true
          if git show-ref --verify --quiet refs/remotes/origin/automation/wiki-revisions; then
            git checkout -B automation/wiki-revisions origin/automation/wiki-revisions
            git rebase origin/main
          else
            git checkout -b automation/wiki-revisions
          fi
      - name: 导入最新 Wiki 修订
        run: npm run import:wiki
      - name: 验证生成记录
        run: npm run validate
      - name: 拒绝异常数据减少
        run: npm run validate:wiki-import
      - name: 检测来源变更
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git diff --stat
            git status --short
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: 提交 Wiki 审核队列
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: refresh official Wiki revisions"
          git push --force-with-lease --set-upstream origin automation/wiki-revisions
          if [[ "$(gh pr list --head automation/wiki-revisions --state open --json number --jq 'length')" == "0" ]]; then
            cat > "$RUNNER_TEMP/wiki-review-pr.md" <<'EOF'
          这是官方 Wiki 自动导入产生的待审核变更，不应直接合并。

          审核步骤：

          - [ ] 检查新增、删除记录是否符合当前 Wiki
          - [ ] 检查配方、位置、版本号等结构化字段变化
          - [ ] 打开关键页面，确认生成内容和多语言页面没有异常
          - [ ] 确认 `npm run validate` 与 `npm run validate:wiki-import` 通过
          - [ ] 发现来源异常时关闭 PR，不要为了通过检查而编造数据
          EOF
            gh pr create --draft --base main --head automation/wiki-revisions \
              --title "待审核：官方 Wiki 修订变更" \
              --body-file "$RUNNER_TEMP/wiki-review-pr.md"
          fi
          echo "官方 Wiki 修订发生变化，审核分支已更新。" >> "$GITHUB_STEP_SUMMARY"
