name: 收集玩家问题候选

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: player-question-candidates
  cancel-in-progress: false

jobs:
  collect:
    name: 收集玩家问题候选
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 设置 Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: 准备审核分支
        run: |
          review_branch="automation/player-question-candidates"
          previous_candidates="$RUNNER_TEMP/player-question-candidates.json"
          git fetch origin main
          git fetch origin "$review_branch" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$review_branch" && \
             git cat-file -e "refs/remotes/origin/$review_branch:data/player-question-candidates.json"; then
            git show "refs/remotes/origin/$review_branch:data/player-question-candidates.json" > "$previous_candidates"
          fi
          git checkout -B "$review_branch" origin/main
          if [[ -s "$previous_candidates" ]]; then
            cp "$previous_candidates" data/player-question-candidates.json
          fi
      - name: 收集新的 Reddit 问题候选
        env:
          REDDIT_USER_AGENT: linux:com.specialzhou.subnautica2guide:v0.2.0 (by /u/Comprehensive-Push20)
        run: node scripts/collect-player-question-candidates.mjs --max-details=4 --detail-delay-ms=65000 --fetch-attempts=3 --fetch-retry-delay-ms=5000 --allow-stale-feed
      - name: 验证候选队列和生成页面
        run: npm run validate
      - name: 提交候选审核队列
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/player-question-candidates.json data/player-question-candidates.md; then
            echo "候选队列没有变化。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/player-question-candidates.json data/player-question-candidates.md
          git commit -m "chore: 更新玩家问题候选"
          git push --force-with-lease --set-upstream origin automation/player-question-candidates
          if [[ "$(gh pr list --head automation/player-question-candidates --state open --json number --jq 'length')" == "0" ]]; then
            cat > "$RUNNER_TEMP/player-question-pr.md" <<'EOF'
          这是 Reddit RSS 自动收集的玩家问题候选，只进入系统证据审核，不会自动发布到攻略站。

          系统处理步骤：

          - `system-review`：等待系统核对 Reddit 上下文、官方资料和证据边界
          - `ready-to-reply`：证据审核完成，可以生成回复草稿
          - `dismissed`：重复、已解决、信息不足或不适合攻略化

          站长不需要判断游戏事实；只有证据完整的内容才能进入攻略或流量机会。
          EOF
            gh pr create --draft --base main --head automation/player-question-candidates \
              --title "系统审核：新的玩家问题候选" \
              --body-file "$RUNNER_TEMP/player-question-pr.md"
          fi
