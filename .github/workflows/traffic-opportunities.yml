name: 整理 Reddit 流量机会

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: traffic-opportunities
  cancel-in-progress: true

jobs:
  prepare:
    name: 整理流量机会
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 设置 Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: 读取最新候选问题
        run: |
          git fetch origin automation/player-question-candidates || true
          if git show-ref --verify --quiet refs/remotes/origin/automation/player-question-candidates; then
            git checkout origin/automation/player-question-candidates -- data/player-question-candidates.json
          fi
      - name: 读取已处理机会状态
        run: |
          state_branch="automation/traffic-opportunity-state"
          state_file="$RUNNER_TEMP/traffic-opportunity-state.json"
          git fetch origin "$state_branch:refs/remotes/origin/$state_branch" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$state_branch"; then
            git show "refs/remotes/origin/$state_branch:data/traffic-opportunity-state.json" > "$state_file"
          elif [[ -f data/traffic-opportunity-state.json ]]; then
            cp data/traffic-opportunity-state.json "$state_file"
          else
            printf '%s\n' '{"schemaVersion":"1.0.0","seenOpportunityKeys":[]}' > "$state_file"
          fi
      - name: 生成待审核回复草稿
        id: opportunities
        run: npm run traffic:opportunities -- --output="$RUNNER_TEMP/traffic-opportunities.md" --state="$RUNNER_TEMP/traffic-opportunity-state.json" --state-output="$RUNNER_TEMP/next-traffic-opportunity-state.json"
      - name: 验证机会筛选逻辑
        run: npm run test:traffic
      - name: 创建待审核 Issue
        if: steps.opportunities.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create traffic-opportunity --color "0e8a16" --description "待人工审核的 Reddit 流量机会" --force
          report_date="$(TZ=Asia/Shanghai date +%F)"
          gh issue create --title "待审核：Reddit 流量机会（$report_date）" --label traffic-opportunity --body-file "$RUNNER_TEMP/traffic-opportunities.md"
      - name: 保存已处理机会状态
        run: |
          state_branch="automation/traffic-opportunity-state"
          state_ref="origin/main"
          if git show-ref --verify --quiet "refs/remotes/origin/$state_branch"; then
            state_ref="refs/remotes/origin/$state_branch"
          fi
          state_worktree="$RUNNER_TEMP/traffic-opportunity-state-worktree"
          git worktree add -B "$state_branch" "$state_worktree" "$state_ref"
          install -D "$RUNNER_TEMP/next-traffic-opportunity-state.json" "$state_worktree/data/traffic-opportunity-state.json"
          git -C "$state_worktree" config user.name "github-actions[bot]"
          git -C "$state_worktree" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$state_worktree" add data/traffic-opportunity-state.json
          if ! git -C "$state_worktree" diff --cached --quiet; then
            git -C "$state_worktree" commit -m "chore: 更新流量机会状态"
            git -C "$state_worktree" push origin "HEAD:$state_branch"
          fi
