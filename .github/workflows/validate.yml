name: 验证生成的攻略站

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: 验证数据、页面和多语言
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
      - name: 设置 Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: 运行完整校验
        run: npm run validate
